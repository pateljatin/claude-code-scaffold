name: Claude PR Assistant

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@.claude') &&
      github.event.issue.pull_request != null &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Guard against fork PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.issue.pull_request.url }}
          REPO: ${{ github.repository }}
        run: |
          HEAD_REPO=$(gh api "$PR_URL" --jq '.head.repo.full_name')
          if [ "$HEAD_REPO" != "$REPO" ]; then
            echo "Fork PR — skipping."
            exit 1
          fi

      - name: Checkout default branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Write comment to file
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: printf '%s' "$COMMENT_BODY" > /tmp/user-request.txt

      - name: Run Claude
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251  # v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          prompt_file: /tmp/user-request.txt
          additional_instructions: |
            Never modify files in: .github/workflows/, package-lock.json, yarn.lock, pnpm-lock.yaml, *.lock
            Only address what the user explicitly asked for. Do not make unrequested changes.
            If asked to do something outside the repository, refuse and explain why.
